name: Android Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify release secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os

          required = (
              "SUPABASE_URL",
              "SUPABASE_PUBLISHABLE_KEY",
              "ANDROID_KEYSTORE_BASE64",
              "ANDROID_KEYSTORE_PASSWORD",
              "ANDROID_KEY_ALIAS",
              "ANDROID_KEY_PASSWORD",
          )
          missing = [name for name in required if not os.environ.get(name, "").strip()]
          if missing:
              raise SystemExit("Missing required GitHub Actions secrets: " + ", ".join(missing))
          PY
      - name: Install dependencies
        run: flutter pub get
      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import binascii
          import os
          from pathlib import Path

          def property_value(value):
              escaped = []
              for char in value:
                  if char == "\\":
                      escaped.append("\\\\")
                  elif char == "\t":
                      escaped.append("\\t")
                  elif char == "\n":
                      escaped.append("\\n")
                  elif char == "\r":
                      escaped.append("\\r")
                  elif char in " :=#!":
                      escaped.append("\\" + char)
                  elif ord(char) < 0x20 or ord(char) > 0x7e:
                      escaped.append(f"\\u{ord(char):04x}")
                  else:
                      escaped.append(char)
              return "".join(escaped)

          encoded = "".join(os.environ["ANDROID_KEYSTORE_BASE64"].split())
          try:
              keystore = base64.b64decode(encoded, validate=True)
          except (binascii.Error, ValueError):
              raise SystemExit("ANDROID_KEYSTORE_BASE64 is not valid Base64.") from None
          if not keystore:
              raise SystemExit("ANDROID_KEYSTORE_BASE64 decoded to an empty file.")

          Path("android/mashbash-release-key.jks").write_bytes(keystore)
          properties = {
              "storePassword": os.environ["ANDROID_KEYSTORE_PASSWORD"],
              "keyPassword": os.environ["ANDROID_KEY_PASSWORD"],
              "keyAlias": os.environ["ANDROID_KEY_ALIAS"],
              "storeFile": "../mashbash-release-key.jks",
          }
          Path("android/key.properties").write_text(
              "".join(f"{key}={property_value(value)}\n" for key, value in properties.items()),
              encoding="ascii",
          )
          PY
          chmod 600 android/mashbash-release-key.jks android/key.properties
          keytool -list \
            -keystore android/mashbash-release-key.jks \
            -storepass:env ANDROID_KEYSTORE_PASSWORD \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
      - name: Build release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          MASHBASH_REQUIRE_RELEASE_SIGNING: "true"
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"
          test -s build/app/outputs/flutter-apk/app-release.apk
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
      - name: Remove release signing files
        if: always()
        run: rm -f android/mashbash-release-key.jks android/key.properties
