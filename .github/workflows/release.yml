name: Signed Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Verify release secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
      - name: Generate platform support files
        run: |
          flutter create --platforms=android .
          rm -f test/widget_test.dart
          rm -f android/settings.gradle.kts android/build.gradle.kts android/app/build.gradle.kts
      - name: Configure Android release signing
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/mashbash-release-key.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=../mashbash-release-key.jks"
          } > android/key.properties
      - name: Install dependencies
        run: flutter pub get
      - name: Generate Android launcher icons
        run: dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
      - name: Build signed release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"
      - name: Build signed release AAB
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"
      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: mashbash-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: mashbash-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
      - name: Remove signing files
        if: always()
        run: rm -f android/mashbash-release-key.jks android/key.properties
