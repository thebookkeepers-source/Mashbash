name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate platform support files
        run: |
          flutter create --platforms=android .
          rm -f test/widget_test.dart
          rm -f android/settings.gradle.kts android/build.gradle.kts android/app/build.gradle.kts
      - name: Install dependencies
        run: flutter pub get
      - name: Verify Supabase migration
        run: |
          test -f supabase/migrations/20260606110000_initial_schema.sql
          test -f supabase/migrations/20260607120000_production_workflows.sql
          test -f supabase/migrations/20260607160000_delivery_settings.sql
          test -f supabase/migrations/20260607190000_notifications_and_safe_archives.sql
          test -f supabase/migrations/20260607193000_notification_security_hardening.sql
          test -f supabase/migrations/20260607194500_device_token_policy_lockdown.sql
          test -f supabase/migrations/20260607195500_trigger_function_lockdown.sql
          test -f supabase/migrations/20260607202000_notification_event_deduplication.sql
          test -f supabase/functions/create-staff/index.ts
          test -f supabase/functions/send-notification/index.ts
          test -f lib/screens/rider/rider_panel.dart
          test -f lib/services/connectivity_service.dart
          test -f lib/services/notification_service.dart
          test -f android/app/google-services.json
          test -f assets/branding/app_icon.png
          test -f assets/branding/logo.png
          test -f android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          test ! -f android/app/src/main/res/drawable/ic_launcher_foreground.xml
          grep -q 'id "com.google.gms.google-services" version "4.4.4" apply false' android/settings.gradle
          grep -q 'id "com.google.gms.google-services"' android/app/build.gradle
          ! grep -R "BEGIN PRIVATE KEY\\|\"private_key\":" lib android supabase/functions README.md
      - name: Verify Supabase build config
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
      - name: Build Android APK
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mashbash-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
