name: mashbash
description: Mashbash food delivery and restaurant operations app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.2
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  lottie: ^3.3.1
  fl_chart: ^1.0.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
