name: mashbash
description: Mashbash food delivery and restaurant operations app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.10.0
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0
  connectivity_plus: ^7.0.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  lottie: ^3.3.1
  fl_chart: ^1.0.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo.png
